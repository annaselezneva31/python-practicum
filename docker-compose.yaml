services:
  api:
    build: .
    container_name: fastapi_app
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: facts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"

  celery-worker:
    build: .
    container_name: celery_worker
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    command: >
      celery -A app.core.celery_app:celery_app worker
      --loglevel=info

  celery-beat:
    build: .
    container_name: celery_beat
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    command: >
      celery -A app.core.celery_app:celery_app beat
      --loglevel=info

volumes:
  postgres_data: