name: CI

on:
  push:
    branches: ["*"] # any branches

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # clone repo

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make tests
